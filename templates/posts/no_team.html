<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Active Team Found</title>
    <!-- Using CDN for clean design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card text-center shadow-sm p-4" style="max-width: 500px; width: 100%;">
        <div class="card-body">
            <h1 class="text-danger h3 mb-3">No Active Team Found</h1>
            <p class="text-muted mb-4">
                Your account is currently not associated with any active team. 
                This usually occurs for users created before the team synchronization system was activated.
            </p>
            <div class="d-grid gap-2">
                <a href="/admin/" class="btn btn-primary">Open Django Admin (to link a Team)</a>
                <a href="/logout/" class="btn btn-outline-secondary">Log Out</a>
            </div>
        </div>
    </div>
</body>
</html>
