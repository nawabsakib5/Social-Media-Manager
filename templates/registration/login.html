<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — SocialManager</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --body-bg: #f8fafc;
            --accent: #f25c38;
            --accent-glow: rgba(242, 92, 56, 0.15);
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        }

        body { 
            background-color: var(--body-bg); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* ── Soft Background Ambient Glows ── */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-glow);
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            pointer-events: none;
            opacity: 0.8;
        }
        .glow-1 { top: -50px; left: -50px; }
        .glow-2 { bottom: -50px; right: -50px; }

        /* ── Modern Floating Login Card ── */
        .login-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 40px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f3f7;
            z-index: 10;
            position: relative;
        }

        .brand-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), #ff7a59);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 6px 16px var(--accent-glow);
            margin-bottom: 12px;
        }

        .brand-title { 
            color: var(--text-dark); 
            font-size: 20px; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }

        .form-label {
            font-size: 13.5px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        /* ── Modern Bootstrap Inputs styling ── */
        .input-group-text {
            background-color: #f8fafc;
            border-color: #cbd5e1;
            color: #64748b;
            border-radius: 10px 0 0 10px;
        }

        .form-control {
            border-radius: 10px;
            border-color: #cbd5e1;
            padding: 10px 14px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .input-group .form-control {
            border-radius: 0 10px 10px 0;
        }

        /* ── Gradient Submit Button ── */
        .btn-submit {
            background: linear-gradient(135deg, var(--accent), #ff7a59);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 14.5px;
            font-weight: 600;
            color: #fff;
            box-shadow: 0 4px 14px var(--accent-glow);
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
            color: #fff;
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .text-xs { font-size: 12px; }
        .hover-accent { transition: color 0.15s ease; }
        .hover-accent:hover { color: var(--accent) !important; }
    </style>
</head>
<body>

<!-- Ambient Glow Elements -->
<div class="ambient-glow glow-1" id="glow-1"></div>
<div class="ambient-glow glow-2" id="glow-2"></div>

<div class="login-card" id="login-card" style="opacity:0; transform: translateY(40px);">
    
    <!-- Brand Header -->
    <div class="brand-wrap" id="brand-header">
        <div class="brand-icon" id="brand-icon"><i class="fa-solid fa-share-nodes"></i></div>
        <div class="brand-title">SocialManager</div>
        <small class="text-muted text-xs mt-1">SaaS Management Platform</small>
    </div>

    <!-- Django Error Alert Messages -->
    {% if messages %}
    <div class="mb-3" id="alerts-wrap">
        {% for message in messages %}
        <div class="alert alert-danger py-2 px-3 d-flex align-items-center gap-2 border-0 shadow-sm" role="alert" style="background: #fef2f2; color: #b91c1c; border-radius: 10px; font-size: 13px;">
            <i class="fa-solid fa-circle-exclamation text-xs"></i>
            <span>{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Authentication Form -->
    <form method="post" id="login-form">
        {% csrf_token %}
        
        <!-- Username input group -->
        <div class="mb-3 form-item" style="opacity:0; transform: translateY(12px);">
            <label class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
            </div>
        </div>

        <!-- Password input group -->
        <div class="mb-4 form-item" style="opacity:0; transform: translateY(12px);">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label mb-0">Password</label>
                <a href="{% url 'accounts:change_password' %}" class="text-xs text-muted text-decoration-none hover-accent">Forgot?</a>
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            </div>
        </div>

        <!-- Action Button -->
        <button type="submit" class="btn btn-submit w-100 mb-3 form-item" id="submit-btn" style="opacity:0; transform: translateY(12px);">
            Sign In <i class="fa-solid fa-right-to-bracket ms-1.5"></i>
        </button>

        
    </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<!-- GSAP Animation Engine -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    gsap.config({ force3D: true });

    const timeline = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // 1. Ambient lighting expansion
    timeline.from('#glow-1', { scale: 0.5, opacity: 0, duration: 1 })
            .from('#glow-2', { scale: 0.5, opacity: 0, duration: 1 }, '-=0.8')

    // 2. Main login card slide up with spring bounce
    .to('#login-card', {
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: 'back.out(1.15)'
    }, '-=1')

    // 3. Brand Header Icon rotation & scale effect
    .from('#brand-icon', {
        scale: 0.4,
        rotate: -30,
        opacity: 0,
        duration: 0.5,
        ease: 'back.out(1.5)'
    }, '-=0.4')

    // 4. Staggered entry for form fields & action buttons
    .to('.form-item', {
        opacity: 1,
        y: 0,
        duration: 0.5,
        stagger: 0.08
    }, '-=0.3');

    // Soft alert message scaling sequence (যদি থাকে)
    const alert = document.getElementById('alerts-wrap');
    if (alert) {
        gsap.from(alert, {
            scale: 0.95,
            opacity: 0,
            duration: 0.4,
            ease: 'power2.out'
        });
    }
});
</script>
</body>
</html>
