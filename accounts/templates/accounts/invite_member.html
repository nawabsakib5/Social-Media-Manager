<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Team Member - {{ active_team.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm p-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 text-primary mb-0">Invite Team Member</h1>
                    <span class="badge bg-secondary">{{ active_team.name }}</span>
                </div>
                
                <p class="text-muted mb-4">
                    Enter the Gmail address of the person you want to invite. 
                    The system will automatically generate a secure password and email them their login credentials.
                </p>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">{{ form.email.label }}</label>
                        {{ form.email }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label font-weight-bold">{{ form.role.label }}</label>
                        {{ form.role }}
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success py-2 font-weight-bold">
                            Send Invitation & Create Account
                        </button>
                        <a href="{% url 'post_list' %}" class="btn btn-outline-secondary">Back to Dashboard</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
