{% extends "base.html" %}
{% block title %}Connect Account{% endblock %}
{% block page_title %}Connect Account{% endblock %}
{% block content %}
<div class="card p-4" style="max-width: 600px;">
    <h5 class="mb-4">Connect New Account</h5>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            <div>{{ field }}</div>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-plug me-1"></i>Connect
        </button>
    </form>
</div>
{% endblock %}
