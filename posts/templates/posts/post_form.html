{% extends "base.html" %}
{% block title %}Create Post{% endblock %}
{% block page_title %}Create Post{% endblock %}
{% block content %}
<div class="card p-4" style="max-width: 650px;">
    <h5 class="mb-4">New Post</h5>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            <div>{{ field }}</div>
            {% if field.errors %}
                <div class="text-danger" style="font-size:12px;">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-floppy-disk me-1"></i>Save Post
        </button>
    </form>
</div>
{% endblock %}
