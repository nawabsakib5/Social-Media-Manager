{% extends "base.html" %}
{% block title %}Create Post{% endblock %}
{% block page_title %}Create Post{% endblock %}
{% block content %}
<div class="card p-4" style="max-width: 650px;">
    <h5 class="mb-4">New Post</h5>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            <div>{{ field }}</div>
            {% if field.errors %}
                <div class="text-danger" style="font-size:12px;">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-3">
            <button type="submit" name="post_type" value="instant" class="btn btn-primary">
                ⚡ এখনই Post করুন
            </button>
            <button type="submit" name="post_type" value="scheduled" class="btn btn-outline-secondary">
                🕐 Schedule করুন
            </button>
        </div>
    </form>
</div>
{% endblock %}
